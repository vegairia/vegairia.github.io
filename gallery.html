<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iria Vega | Gallery</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #666;
            --line-color: #e0e0e0;
            --specific-red: #CD2424;
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;

            --switch-bg-off: #e9e9ea;
            --switch-bg-on: #ffffff;
            --switch-knob-off: #ffffff;
            --switch-knob-on: #000000;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #f0f0f0;
            --accent-color: #aaa;
            --line-color: #333;
            --switch-bg-off: #3a3a3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; color: inherit; transition: opacity 0.3s; }
        ul { list-style: none; }

        /* --- HEADER --- */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 1.5rem 3rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        body.dark-mode header { background-color: rgba(18, 18, 18, 0.8); }

        .nav-left { justify-self: start; }
        .nav-left a:hover { color: var(--specific-red); opacity: 1; }

        .logo-container { justify-self: center; }
        .logo-img { height: 40px; width: auto; display: block; transition: opacity 0.3s ease; }
        .logo-dark { display: none; }
        body.dark-mode .logo-light { display: none; }
        body.dark-mode .logo-dark { display: block; }

        .nav-right { justify-self: end; }
        .nav-right ul { display: flex; gap: 2rem; align-items: center; }
        .nav-right a:hover { opacity: 0.6; }

        /* --- WIP CONTENT --- */
        .wip-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 5%;
            gap: 2rem;
        }

        .wip-icon {
            width: 120px;
            height: 120px;
            position: relative;
        }

        /* Hard hat / construction animation */
        .gear {
            width: 80px;
            height: 80px;
            border: 6px solid var(--text-color);
            border-radius: 50%;
            position: relative;
            margin: 0 auto;
            animation: gearSpin 4s linear infinite;
        }

        .gear::before,
        .gear::after {
            content: '';
            position: absolute;
            background: var(--text-color);
        }

        .gear::before {
            width: 6px;
            height: 20px;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
        }

        .gear::after {
            width: 20px;
            height: 6px;
            top: 50%;
            left: -20px;
            transform: translateY(-50%);
            border-radius: 3px;
        }

        .gear-tooth-1,
        .gear-tooth-2,
        .gear-tooth-3 {
            position: absolute;
            width: 6px;
            height: 20px;
            background: var(--text-color);
            border-radius: 3px;
        }

        .gear-tooth-1 {
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .gear-tooth-2 {
            top: 50%;
            right: -20px;
            transform: translateY(-50%);
            width: 20px;
            height: 6px;
        }

        .gear-tooth-3 {
            width: 6px;
            height: 20px;
            top: 6px;
            right: -2px;
            transform: rotate(45deg);
        }

        .gear-center {
            width: 20px;
            height: 20px;
            background: var(--text-color);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes gearSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Animated dots */
        .wip-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .wip-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-color);
            animation: dotPulse 1.4s infinite ease-in-out;
        }

        .wip-dot:nth-child(1) { animation-delay: 0s; }
        .wip-dot:nth-child(2) { animation-delay: 0.2s; }
        .wip-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.2); }
        }

        .wip-title {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        .wip-subtitle {
            font-size: 1rem;
            font-weight: 300;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .wip-bar {
            width: 200px;
            height: 3px;
            background: var(--line-color);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .wip-bar-fill {
            width: 40%;
            height: 100%;
            background: var(--specific-red);
            border-radius: 3px;
            animation: barPulse 2s ease-in-out infinite;
        }

        @keyframes barPulse {
            0% { width: 20%; }
            50% { width: 60%; }
            100% { width: 20%; }
        }

        .wip-back {
            margin-top: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            transition: color 0.3s;
        }

        .wip-back:hover {
            color: var(--specific-red);
            opacity: 1;
        }

        /* --- SWITCH --- */
        .apple-switch { position: fixed; bottom: 30px; right: 30px; z-index: 1000; display: inline-block; width: 50px; height: 30px; }
        .apple-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--switch-bg-off); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 2px; bottom: 2px; background-color: var(--switch-knob-off); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--switch-bg-on); }
        input:checked + .slider:before { transform: translateX(20px); background-color: var(--switch-knob-on); }

        @media (max-width: 768px) {
            header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 1rem 1.2rem;
                font-size: 0.7rem;
                letter-spacing: 0.5px;
            }
            .nav-left { display: none; }
            .nav-right ul { gap: 1rem; }
            .logo-img { height: 32px; }
        }

        @media (max-width: 480px) {
            header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0.8rem 1rem;
                font-size: 0.6rem;
                letter-spacing: 0.3px;
            }
            .nav-left { display: none; }
            .logo-img { height: 26px; }
            .nav-right ul { gap: 0.7rem; }
            .wip-icon { width: 80px; height: 80px; }
            .gear { width: 50px; height: 50px; border-width: 4px; }
            .gear::before { width: 4px; height: 14px; top: -14px; }
            .gear::after { width: 14px; height: 4px; left: -14px; }
            .gear-tooth-1 { bottom: -14px; width: 4px; height: 14px; }
            .gear-tooth-2 { right: -14px; width: 14px; height: 4px; }
            .gear-center { width: 14px; height: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-left"><a href="index.html#contact">Contact</a></div>

        <div class="logo-container">
            <a href="index.html">
                <img src="logos/LOGO_ROJO.png" alt="Logo Iria Vega" class="logo-img logo-light">
                <img src="logos/bLOGO_ROJO.png" alt="Logo Iria Vega" class="logo-img logo-dark">
            </a>
        </div>

        <nav class="nav-right">
            <ul>
                <li><a href="about.html">About Me</a></li>
                <li><a href="gallery.html" style="color: var(--specific-red);">Gallery</a></li>
                <li><a href="index.html#projects">Projects</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="wip-container">
            <div class="wip-icon">
                <div class="gear">
                    <div class="gear-center"></div>
                    <div class="gear-tooth-1"></div>
                    <div class="gear-tooth-2"></div>
                </div>
            </div>

            <div class="wip-dots">
                <div class="wip-dot"></div>
                <div class="wip-dot"></div>
                <div class="wip-dot"></div>
            </div>

            <h1 class="wip-title">Work in Progress</h1>
            <p class="wip-subtitle">Trabajando en este apartado</p>

            <div class="wip-bar">
                <div class="wip-bar-fill"></div>
            </div>

            <a href="index.html" class="wip-back">&larr; Volver al Portfolio</a>
        </div>
    </main>

    <label class="apple-switch">
        <input type="checkbox" id="theme-toggle">
        <span class="slider"></span>
    </label>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const body = document.body;

        if(localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            toggle.checked = true;
        }

        toggle.addEventListener('change', () => {
            if(toggle.checked) {
                body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
